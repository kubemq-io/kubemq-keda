apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubemq-keda-scaler.fullname" . }}
  labels:
    {{- include "kubemq-keda-scaler.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubemq-keda-scaler.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kubemq-keda-scaler.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "kubemq-keda-scaler.serviceAccountName" . }}
      containers:
        - name: scaler
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.env.grpcPort }}
              protocol: TCP
          env:
            - name: GRPC_PORT
              value: {{ .Values.env.grpcPort | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.env.logLevel | quote }}
          {{- /* Both probes check gRPC server health only, not KubeMQ broker connectivity. */}}
          {{- /* gRPC native probes require Kubernetes 1.27+. */}}
          livenessProbe:
            grpc:
              port: {{ .Values.env.grpcPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            grpc:
              port: {{ .Values.env.grpcPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
