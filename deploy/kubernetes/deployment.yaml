apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubemq-keda-scaler
  labels:
    app.kubernetes.io/name: kubemq-keda-scaler
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: scaler
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kubemq-keda-scaler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubemq-keda-scaler
    spec:
      serviceAccountName: default
      containers:
        - name: scaler
          image: kubemq/kubemq-keda-scaler:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 9090
              protocol: TCP
          env:
            - name: GRPC_PORT
              value: "9090"
            - name: LOG_LEVEL
              value: "info"
          # Both probes check gRPC server health only, not KubeMQ broker connectivity.
          # gRPC native probes require Kubernetes 1.27+.
          livenessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            grpc:
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
